
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pure Grow Farm Visit</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f1f8e9;
}

header {
    background: #2e7d32;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 420px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: green;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: darkgreen;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

.qr {
    text-align: center;
    margin: 15px 0;
}

.qr img {
    width: 150px;
    height: 200px;
}

.hidden {
    display: none;
}

#msg {
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
}
</style>



</head>
<body>
    <script src="script.js"></script>

<header>
    <h1>🌾 Pure Grow Farm</h1>
    <p>Book Your Visit</p>
</header>

<div class="container">

    <!-- Selection -->
    <button onclick="showStudent()">🎓 Student Internship (₹80)</button>
    <button onclick="showFarmer()">🚜 Farmer Visit (₹599)</button>

    <!-- Student Form -->
    <form id="studentForm" class="hidden">
        <h3>Student Internship</h3>

        <input type="text" id="s_name" placeholder="Name" required>
        <input type="tel" id="s_phone" placeholder="Mobile Number" required>
        <input type="text" id="s_enroll" placeholder="Enrollment Number" required>
        <input type="text" id="s_degree" placeholder="Degree" required>

        <div class="qr">
            <p>Scan & Pay ₹80</p>
            <img src="mushroom/Scanner .jpg">
        </div>

        <input type="text" id="s_payment" placeholder="Payment ID" required>

        <button type="submit">Submit</button>
    </form>

    <!-- Farmer Form -->
    <form id="farmerForm" class="hidden">
        <h3>Farmer Visit</h3>

        <input type="text" id="f_name" placeholder="Name" required>
        <input type="tel" id="f_phone" placeholder="Mobile Number" required>
        <input type="date" id="f_date" required>

        <div class="qr">
            <p>Scan & Pay ₹599</p>
            <img src="mushroom/Scanner .jpg">
        </div>

        <input type="text" id="f_payment" placeholder="Payment ID" required>

        <button type="submit">Submit</button>
    </form>

    <p id="msg"></p>

</div>

<script>

</script>

</body>
</html>
