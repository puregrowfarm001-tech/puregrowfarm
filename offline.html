<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pure Grow Farm - Offline</title>
  <meta name="theme-color" content="#2b8a3e">
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      margin: 0;
      font-family: Inter, system-ui, Segoe UI, Roboto, Arial, sans-serif;
      color: #101820;
      background: #f6faf5;
    }
    main {
      width: min(520px, calc(100% - 32px));
      padding: 20px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 6px 22px rgba(12, 18, 20, 0.06);
    }
    h1 { margin: 0 0 8px; font-size: 26px; }
    p { margin: 0; color: #667085; }
    a {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 10px;
      color: #fff;
      background: #2b8a3e;
      font-weight: 750;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>You are offline</h1>
    <p>Please check your internet connection and open Pure Grow Farm again.</p>
    <a href="/index.html">Try Again</a>
  </main>
</body>
</html>
