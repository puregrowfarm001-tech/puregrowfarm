<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pure Grow Farm - Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, Segoe UI, Roboto, Arial, sans-serif;
      color: #101820;
      background: #f6faf5;
    }
    main {
      width: min(520px, calc(100% - 32px));
      padding: 24px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(12, 18, 20, 0.08);
    }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { margin: 0; color: #667085; }
  </style>
</head>
<body>
  <main>
    <h1>Pure Grow Farm</h1>
    <p>You are offline. Please connect internet and open the app again.</p>
  </main>
</body>
</html>
