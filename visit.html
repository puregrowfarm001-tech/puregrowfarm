<!DOCTYPE html>
<html lang="en">
<head>
     <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script src="script.js"></script>

     <form id="contactForm" onsubmit="submitForm(event)">
              <input type="text" id="name" placeholder="Your name" required />
              <input type="tel" id="phone" placeholder="Phone (e.g. 9067891039)" pattern="[0-9]{10}" required />
              <input type="email" id="email" placeholder="Email" />
              <input type="date" id="DATE" placeholder="Date" required/>
              <select id="product">
                <option value="green">student</option>
                <option value="dry">farmer</option>
              </select>

              <select id="quantity">
               <style>

.custom-select{
width:300px;
position:relative;
font-family:Arial;
}

.select-box{
border:1px solid #ccc;
padding:12px;
border-radius:8px;
cursor:pointer;
background:#fff;
}

.options{
display:none;
border:1px solid #ccc;
border-radius:8px;
margin-top:5px;
background:#fff;
overflow:hidden;
}

.option{
padding:10px;
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.option:hover{
background:#f1f1f1;
}

.option img{
width:30px;
height:30px;
}

</style>
</head>

<body>

<div class="custom-select">

<div class="select-box" onclick="toggleOptions()">
Select Payment Method
</div>

<div class="options" id="options">

<div class="option" onclick="selectOption('PhonePe')">
<img src="PS.jpg">
PhonePe
</div>

<div class="option" onclick="selectOption('Google Pay')">
<img src="GS.jpg">
Google Pay
</div>


<input type="hidden" name="paymentmethod" id="paymentmethod">

</div>

<script>

function toggleOptions(){
document.getElementById("options").style.display="block";
}

function selectOption(value){
document.querySelector(".select-box").innerHTML=value;
document.getElementById("paymentmethod").value=value;
document.getElementById("options").style.display="none";
}

</script>
              </select>
              <textarea id="message" rows="4" placeholder="Message / Order details"></textarea>
              <button type="submit">Send Order</button>
            </form>
</body>
</html>
