<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pure Grow Farm Visit Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4fff4;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:green;
    margin-bottom:20px;
}

.option-buttons{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.option-buttons button{
    flex:1;
    padding:12px;
    border:none;
    background:green;
    color:white;
    font-size:16px;
    border-radius:10px;
    cursor:pointer;
}

form{
    display:none;
}

form.active{
    display:block;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

.payment-box{
    background:#f1f1f1;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
}

.qr{
    text-align:center;
    margin-top:10px;
}

.qr img{
    width:220px;
    border-radius:10px;
}

.submit-btn{
    width:100%;
    background:orange;
    color:white;
    padding:14px;
    border:none;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
    margin-top:15px;
}

.success{
    text-align:center;
    color:green;
    margin-top:15px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h1>Pure Grow Farm Visit Form</h1>

<div class="option-buttons">
    <button onclick="showForm('studentForm')">Student Internship</button>
    <button onclick="showForm('farmerForm')">Farmer Training</button>
</div>

<!-- STUDENT FORM -->

<form id="studentForm" class="active">

<input type="text" id="sname" placeholder="Student Name" required>

<input type="tel" id="sphone" placeholder="Phone Number" required>

<input type="text" id="senroll" placeholder="Enrollment Number" required>

<input type="text" id="scollege" placeholder="College Name" required>

<label>Internship Start Date</label>
<input type="date" id="sstart" required>

<label>Internship End Date</label>
<input type="date" id="send" required>

<input type="text" id="spayment" placeholder="Payment ID" required>

<div class="payment-box">
<h3>Student Internship Fees : ₹100</h3>
<p>Pay on GPay Number:</p>
<h2>9067891039</h2>

<div class="qr">
<!-- Replace this image with your GPay QR -->
<img src="GS.jpg" alt="GPay QR">
</div>
</div>

<button type="button" class="submit-btn" onclick="submitStudent()">
Submit Student Form
</button>

</form>

<!-- FARMER FORM -->

<form id="farmerForm">

<input type="text" id="fname" placeholder="Farmer Name" required>

<input type="tel" id="fphone" placeholder="Phone Number" required>

<label>Training Date</label>
<input type="date" id="fdate" required>

<input type="text" id="fpayment" placeholder="Payment ID" required>

<div class="payment-box">
<h3>Farmer Training Fees : ₹699</h3>
<p>Pay on GPay Number:</p>
<h2>9067891039</h2>

<div class="qr">
<!-- Replace this image with your GPay QR -->
<img src="GS.jpg" alt="GPay QR">
</div>
</div>

<button type="button" class="submit-btn" onclick="submitFarmer()">
Submit Farmer Form
</button>

</form>

<div class="success" id="successMessage"></div>

</div>

<script>

function showForm(formId){

document.getElementById('studentForm').classList.remove('active');
document.getElementById('farmerForm').classList.remove('active');

document.getElementById(formId).classList.add('active');

}






// STUDENT FORM SUBMIT

function submitStudent(){

let name = document.getElementById("sname").value;
let phone = document.getElementById("sphone").value;
let enroll = document.getElementById("senroll").value;
let college = document.getElementById("scollege").value;
let start = document.getElementById("sstart").value;
let end = document.getElementById("send").value;
let payment = document.getElementById("spayment").value;

let message =
`Student Internship Form

Name: ${name}
Phone: ${phone}
Enrollment No: ${enroll}
College: ${college}
Start Date: ${start}
End Date: ${end}
Payment ID: ${payment}`;






// EMAIL OPEN

window.location.href =
`mailto:puregrowfarm001@gmail.com?subject=Student Internship Form&body=${encodeURIComponent(message)}`;






// WHATSAPP MESSAGE

window.open(
`https://wa.me/91${9067891039}?text=${encodeURIComponent(
"Thank you for registering with Pure Grow Farm 🌱\n\nFarm Location:\nhttps://www.google.com/maps/dir//Pure+Grow+Mushroom+Farm,+Makhiyala,+Gujarat+362011/@21.6077383,70.4431909,15z/data=!4m8!4m7!1m0!1m5!1m1!1s0x395803313ef34a91:0xcfc3fa020115f2c6!2m2!1d70.4485065!2d21.6172832?entry=ttu&g_ep=EgoyMDI2MDUwMi4wIKXMDSoASAFQAw%3D%3D"
)}`
);

document.getElementById("successMessage").innerHTML =
"Thank You! Student Internship Form Submitted Successfully.";

}






// FARMER FORM SUBMIT

function submitFarmer(){

let name = document.getElementById("fname").value;
let phone = document.getElementById("fphone").value;
let date = document.getElementById("fdate").value;
let payment = document.getElementById("fpayment").value;

let message =
`Farmer Training Form

Name: ${name}
Phone: ${phone}
Training Date: ${date}
Payment ID: ${payment}`;






// EMAIL OPEN

window.location.href =
`mailto:puregrowfarm001@gmail.com?subject=Farmer Training Form&body=${encodeURIComponent(message)}`;






// WHATSAPP MESSAGE

window.open(
`https://wa.me/91${phone}?text=${encodeURIComponent(
"Thank you for booking Farmer Training at Pure Grow Farm 🌱\n\nFarm Location:\nhttps://maps.google.com/?q=Pure+Grow+Farm"
)}`
);

document.getElementById("successMessage").innerHTML =
"Thank You! Farmer Training Form Submitted Successfully.";

}

</script>

</body>
</html>
